name: CI

on:
  push:
  pull_request:

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Ruff
        run: python -m ruff check app tests

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Full test suite
        run: python -m pytest -q

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Contract tests
        run: python -m pytest -q tests/contract

  migration-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Alembic upgrade head
        run: python -m alembic upgrade head
      - name: Alembic reproducibility check
        run: bash scripts/check_alembic_reproducibility.sh
