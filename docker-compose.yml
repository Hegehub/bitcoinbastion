services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bitcoin_bastion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - db
      - redis

  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - db
      - redis

volumes:
  pg_data:
